<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Acusto v1.0.0</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    font-family: sans-serif; background: black; color: white;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  #screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    text-align: center; font-size: 6vw; font-weight: 700;
  }
  #label {
    background: rgba(0,0,0,.25); padding: .5em .9em; border-radius: 999px;
  }
</style>
</head>
<body>
<div id="screen"><div id="label">Tap to start</div></div>

<script>
const screenEl = document.getElementById("screen");
const labelEl = document.getElementById("label");

let audioCtx, analyser, dataArray, stream;
let modeIndex = 1; // 0 silent, 1 normal, 2 loud
let beepMuted = false;
let wakeLock = null;
let running = false;

const modes = [
  { name: "SILENT", green: 0.018, orange: 0.028, red: 0.038 },
  { name: "NORMAL", green: 0.028, orange: 0.040, red: 0.055 },
  { name: "LOUD",   green: 0.040, orange: 0.060, red: 0.080 }
];

let history = [];
let redSince = 0;
let lastBeep = 0;

function setState(color, text) {
  screenEl.style.background = color;
  labelEl.textContent = text + (beepMuted ? " · mute" : "");
}

async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
    }
  } catch (e) {}
}

function beep() {
  if (beepMuted) return;
  const now = Date.now();
  if (now - lastBeep < 3000) return;
  lastBeep = now;

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.value = 1100;
  gain.gain.value = 0.03;
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  setTimeout(() => { osc.stop(); ctx.close(); }, 180);
}

function rmsFromTimeData(arr) {
  let sum = 0;
  for (let i = 0; i < arr.length; i++) {
    const v = (arr[i] - 128) / 128;
    sum += v * v;
  }
  return Math.sqrt(sum / arr.length);
}

async function start() {
  if (running) return;
  stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  dataArray = new Uint8Array(analyser.fftSize);
  source.connect(analyser);
  running = true;
  await requestWakeLock();
  loop();
}

function loop() {
  if (!running) return;

  analyser.getByteTimeDomainData(dataArray);
  const rms = rmsFromTimeData(dataArray);

  history.push(rms);
  if (history.length > 12) history.shift(); // ~1.5 sec if loop ~8 fps
  const avg = history.reduce((a,b) => a+b, 0) / history.length;

  const m = modes[modeIndex];
  const now = Date.now();

  if (avg < m.green) {
    redSince = 0;
    setState("#18a34a", m.name + " · OK");
  } else if (avg < m.orange) {
    redSince = 0;
    setState("#f59e0b", m.name + " · BORDER");
  } else {
    setState("#dc2626", m.name + " · TOO LOUD");
    if (!redSince) redSince = now;
    if (now - redSince > 1000) beep();
  }

  requestAnimationFrame(loop);
}

function nextMode() {
  modeIndex = (modeIndex + 1) % modes.length;
}

let pressTimer = null;
let longPress = false;

document.body.addEventListener("pointerdown", async () => {
  longPress = false;
  pressTimer = setTimeout(() => {
    longPress = true;
    beepMuted = !beepMuted;
  }, 700);
});

document.body.addEventListener("pointerup", async () => {
  clearTimeout(pressTimer);
  if (!running) {
    await start();
    return;
  }
  if (!longPress) nextMode();
});

document.addEventListener("visibilitychange", async () => {
  if (document.visibilityState === "visible") await requestWakeLock();
});
</script>
</body>
</html>
