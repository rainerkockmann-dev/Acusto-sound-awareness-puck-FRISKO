<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Acusto v1.1.0</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: black;
      color: white;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    #screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 6vw;
      font-weight: 700;
      transition: background 0.25s linear;
    }

    #label {
      background: rgba(0,0,0,.25);
      padding: .5em .9em;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div id="screen">
    <div id="label">Tap to start</div>
  </div>

  <script>
    const screenEl = document.getElementById("screen");
    const labelEl = document.getElementById("label");

    let audioCtx, analyser, dataArray, stream;
    let wakeLock = null;
    let running = false;
    let beepMuted = false;
    let modeIndex = 1; // 0 silent, 1 normal, 2 loud

    // Wider and calmer ranges
    const modes = [
      { name: "SILENT", greenMax: 0.016, orangeMax: 0.032 },
      { name: "NORMAL", greenMax: 0.024, orangeMax: 0.048 },
      { name: "LOUD",   greenMax: 0.034, orangeMax: 0.065 }
    ];

    // Rolling microphone history
    let history = [];

    // Pressure model
    let pressure = 0;          // 0 = green side, 100 = red side
    let currentState = "start";
    let holdUntil = 0;
    let lastAlarm = 0;

    // Press handling
    let pressTimer = null;
    let longPress = false;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function modeLabel() {
      return modes[modeIndex].name + (beepMuted ? " · mute" : "");
    }

    function rmsFromTimeData(arr) {
      let sum = 0;
      for (let i = 0; i < arr.length; i++) {
        const v = (arr[i] - 128) / 128;
        sum += v * v;
      }
      return Math.sqrt(sum / arr.length);
    }

    function getSmoothedLevel() {
      analyser.getByteTimeDomainData(dataArray);
      const rms = rmsFromTimeData(dataArray);

      history.push(rms);
      if (history.length > 28) history.shift();

      const sorted = [...history].sort((a, b) => a - b);

      // Trim extremes a little, so sudden peaks matter less
      let trimmed = sorted;
      if (sorted.length >= 8) {
        trimmed = sorted.slice(2, sorted.length - 2);
      }

      return trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
    }

    function classifyLevel(avg, mode) {
      if (avg < mode.greenMax) return "green";
      if (avg < mode.orangeMax) return "orange";
      return "red";
    }

    function updatePressure(targetBand, avg, mode) {
      // Normalize inside the current mode bands
      const greenMax = mode.greenMax;
      const orangeMax = mode.orangeMax;

      // Strength factor: louder red builds faster than weak orange
      let intensity = 0;

      if (targetBand === "green") {
        intensity = (greenMax - avg) / greenMax;
        intensity = clamp(intensity, 0, 1);
        // Quiet sound drains pressure
        pressure -= 1.8 + intensity * 2.0;
      } else if (targetBand === "orange") {
        intensity = (avg - greenMax) / (orangeMax - greenMax);
        intensity = clamp(intensity, 0, 1);
        // Orange builds slowly and steadily
        pressure += 0.9 + intensity * 1.4;
        // Slight self-centering so orange hovers more than explodes
        if (pressure > 65) pressure -= 0.25;
      } else {
        intensity = (avg - orangeMax) / Math.max(orangeMax * 0.6, 0.0001);
        intensity = clamp(intensity, 0, 1.5);
        // Red builds more strongly
        pressure += 2.0 + intensity * 2.2;
      }

      pressure = clamp(pressure, 0, 100);
    }

    function chooseStateFromPressure() {
      // These thresholds can be tuned later
      if (pressure < 32) return "green";
      if (pressure < 68) return "orange";
      return "red";
    }

    function setStateVisual(state, blinking = false) {
      const now = Date.now();

      if (state === "green") {
        screenEl.style.background = "#18a34a";
        labelEl.textContent = modeLabel() + " · OK";
        return;
      }

      if (state === "orange") {
        if (blinking) {
          screenEl.style.background = (Math.floor(now / 520) % 2 === 0) ? "#f59e0b" : "#2b1c00";
        } else {
          screenEl.style.background = "#f59e0b";
        }
        labelEl.textContent = modeLabel() + " · BORDER";
        return;
      }

      if (state === "red") {
        if (blinking) {
          screenEl.style.background = (Math.floor(now / 340) % 2 === 0) ? "#dc2626" : "#250000";
        } else {
          screenEl.style.background = "#dc2626";
        }
        labelEl.textContent = modeLabel() + " · TOO LOUD";
        return;
      }

      screenEl.style.background = "black";
      labelEl.textContent = "Tap to start";
    }

    function playAlarm() {
      if (beepMuted) return;

      const now = Date.now();
      if (now - lastAlarm < 6500) return;
      lastAlarm = now;

      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(980, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(760, ctx.currentTime + 2.4);

      gain.gain.setValueAtTime(0.055, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.6);

      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 2.6);
      osc.onended = () => ctx.close();
    }

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      } catch (e) {}
    }

    async function start() {
      if (running) return;

      stream = await navigator.mediaDevices.getUserMedia({
        audio: true,
        video: false
      });

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);

      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      dataArray = new Uint8Array(analyser.fftSize);

      source.connect(analyser);

      running = true;
      history = [];
      pressure = 10;
      currentState = "green";
      holdUntil = 0;

      await requestWakeLock();
      setStateVisual("green");
      loop();
    }

    function loop() {
      if (!running) return;

      const mode = modes[modeIndex];
      const avg = getSmoothedLevel();
      const targetBand = classifyLevel(avg, mode);

      updatePressure(targetBand, avg, mode);

      const desiredState = chooseStateFromPressure();
      const now = Date.now();

      if (now >= holdUntil) {
        if (desiredState !== currentState) {
          currentState = desiredState;

          if (currentState === "green") {
            holdUntil = now + 1200;
          } else if (currentState === "orange") {
            holdUntil = now + 2400;
          } else if (currentState === "red") {
            holdUntil = now + 4200;
            playAlarm();
          }
        }
      }

      const shouldBlink = currentState === "orange" || currentState === "red";
      setStateVisual(currentState, shouldBlink);

      requestAnimationFrame(loop);
    }

    function nextMode() {
      modeIndex = (modeIndex + 1) % modes.length;
      history = [];
      pressure = 10;
      currentState = "green";
      holdUntil = 0;
      setStateVisual("green");
    }

    document.body.addEventListener("pointerdown", async () => {
      longPress = false;
      pressTimer = setTimeout(() => {
        longPress = true;
        beepMuted = !beepMuted;
        if (currentState !== "start") {
          setStateVisual(currentState, currentState === "orange" || currentState === "red");
        }
      }, 700);
    });

    document.body.addEventListener("pointerup", async () => {
      clearTimeout(pressTimer);

      if (!running) {
        await start();
        return;
      }

      if (!longPress) {
        nextMode();
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        await requestWakeLock();
      }
    });

    setStateVisual("start");
  </script>
</body>
</html>
