<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Acusto v1.0.0</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    font-family: sans-serif; background: black; color: white;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  #screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    text-align: center; font-size: 6vw; font-weight: 700;
  }
  #label {
    background: rgba(0,0,0,.25); padding: .5em .9em; border-radius: 999px;
  }
</style>
</head>
<body>
<div id="screen"><div id="label">Tap to start</div></div>

<script>
<script>
const screenEl = document.getElementById("screen");
const labelEl = document.getElementById("label");

let audioCtx, analyser, dataArray, stream;
let modeIndex = 1; // 0 silent, 1 normal, 2 loud
let beepMuted = false;
let wakeLock = null;
let running = false;

const modes = [
  { name: "SILENT", green: 0.014, orange: 0.026, red: 0.050 },
  { name: "NORMAL", green: 0.022, orange: 0.040, red: 0.070 },
  { name: "LOUD",   green: 0.032, orange: 0.055, red: 0.090 }
];

let history = [];
let lastBeep = 0;

let currentState = "start";   // start, green, orange, red
let stateUntil = 0;

function setStateVisual(state, blinking = false) {
  const m = modes[modeIndex];
  const now = Date.now();

  if (state === "green") {
    screenEl.style.background = "#18a34a";
    labelEl.textContent = m.name + " · OK" + (beepMuted ? " · mute" : "");
  }

  if (state === "orange") {
    if (blinking && Math.floor(now / 400) % 2 === 0) {
      screenEl.style.background = "#f59e0b";
    } else if (blinking) {
      screenEl.style.background = "#000000";
    } else {
      screenEl.style.background = "#f59e0b";
    }
    labelEl.textContent = m.name + " · BORDER" + (beepMuted ? " · mute" : "");
  }

  if (state === "red") {
    if (blinking && Math.floor(now / 300) % 2 === 0) {
      screenEl.style.background = "#dc2626";
    } else if (blinking) {
      screenEl.style.background = "#000000";
    } else {
      screenEl.style.background = "#dc2626";
    }
    labelEl.textContent = m.name + " · TOO LOUD" + (beepMuted ? " · mute" : "");
  }

  if (state === "start") {
    screenEl.style.background = "black";
    labelEl.textContent = "Tap to start";
  }
}

async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
    }
  } catch (e) {}
}

function beep() {
  if (beepMuted) return;
  const now = Date.now();
  if (now - lastBeep < 3500) return;
  lastBeep = now;

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.value = 1100;
  gain.gain.value = 0.03;
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  setTimeout(() => { osc.stop(); ctx.close(); }, 180);
}

function rmsFromTimeData(arr) {
  let sum = 0;
  for (let i = 0; i < arr.length; i++) {
    const v = (arr[i] - 128) / 128;
    sum += v * v;
  }
  return Math.sqrt(sum / arr.length);
}

async function start() {
  if (running) return;
  stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  dataArray = new Uint8Array(analyser.fftSize);
  source.connect(analyser);
  running = true;
  await requestWakeLock();
  currentState = "green";
  loop();
}

function decideMeasuredState(avg, m) {
  if (avg < m.green) return "green";
  if (avg < m.orange) return "orange";
  return "red";
}

function loop() {
  if (!running) return;

  analyser.getByteTimeDomainData(dataArray);
  const rms = rmsFromTimeData(dataArray);

  history.push(rms);
  if (history.length > 18) history.shift(); // slower average
  const avg = history.reduce((a,b) => a+b, 0) / history.length;

  const m = modes[modeIndex];
  const measuredState = decideMeasuredState(avg, m);
  const now = Date.now();

  // If we're still inside a hold period, keep current state visible
  if (now < stateUntil) {
    setStateVisual(currentState, currentState === "orange" || currentState === "red");
    requestAnimationFrame(loop);
    return;
  }

  // State transitions
  if (measuredState === "red" && currentState !== "red") {
    currentState = "red";
    stateUntil = now + 4000; // hold red for 4 sec
    beep();
  } else if (measuredState === "orange" && currentState === "green") {
    currentState = "orange";
    stateUntil = now + 2500; // hold orange for 2.5 sec
  } else if (measuredState === "green") {
    currentState = "green";
    stateUntil = 0;
  } else if (measuredState === "orange" && currentState === "red") {
    // after red period ends, do not instantly drop too far
    currentState = "orange";
    stateUntil = now + 2000;
  } else if (measuredState === "red" && currentState === "orange") {
    currentState = "red";
    stateUntil = now + 4000;
    beep();
  }

  setStateVisual(currentState, currentState === "orange" || currentState === "red");
  requestAnimationFrame(loop);
}

function nextMode() {
  modeIndex = (modeIndex + 1) % modes.length;
  history = [];
  currentState = "green";
  stateUntil = 0;
}

let pressTimer = null;
let longPress = false;

document.body.addEventListener("pointerdown", async () => {
  longPress = false;
  pressTimer = setTimeout(() => {
    longPress = true;
    beepMuted = !beepMuted;
  }, 700);
});

document.body.addEventListener("pointerup", async () => {
  clearTimeout(pressTimer);
  if (!running) {
    await start();
    return;
  }
  if (!longPress) nextMode();
});

document.addEventListener("visibilitychange", async () => {
  if (document.visibilityState === "visible") await requestWakeLock();
});

setStateVisual("start");
</script>
